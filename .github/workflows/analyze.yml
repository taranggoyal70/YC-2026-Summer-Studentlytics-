name: Analysis worker

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "analysis_jobs.id to process"
        required: true
        type: string

concurrency:
  group: analyze-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg cmake build-essential

      - name: Install Python dependencies
        run: pip install -r worker/requirements.txt

      - name: Run analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python worker/analyze.py --job-id "${{ inputs.job_id }}"
